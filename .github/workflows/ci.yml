name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
      - run: go test ./... -race -count=1
      - run: go build ./cmd/api ./cmd/migrate ./cmd/worker-jobscraper ./cmd/worker-campaigntick ./cmd/worker-emailfinder ./cmd/worker-contentgen
